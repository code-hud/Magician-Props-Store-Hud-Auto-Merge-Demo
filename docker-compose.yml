services:
  postgres:
    image: postgres:15-alpine
    container_name: magician-props-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: magician_props_store
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/postgres/02-bundle-products.sql:/docker-entrypoint-initdb.d/02-bundle-products.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.2
    container_name: magician-props-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --smp
      - "1"
      - --memory
      - 256M
      - --mode
      - dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health 2>/dev/null | grep -q 'Healthy'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  checkout:
    build:
      context: ./docker/checkout
      dockerfile: Dockerfile
    container_name: magician-props-checkout
    environment:
      PORT: 3002
    ports:
      - "3002:3002"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3002/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # `:?` makes compose abort with an error if GIT_COMMIT_SHA is unset or
        # empty in the shell env, so we can never accidentally build with no
        # commit tag. Set it via:  GIT_COMMIT_SHA=$(git rev-parse --short HEAD)
        GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:?GIT_COMMIT_SHA must be set, e.g. export GIT_COMMIT_SHA=$(git rev-parse --short HEAD)}
    container_name: magician-props-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/magician_props_store
      PORT: 3001
      CHECKOUT_SERVICE_URL: http://checkout:3002
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      HUD_API_KEY: ${HUD_API_KEY}
      GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:?GIT_COMMIT_SHA must be set, e.g. export GIT_COMMIT_SHA=$(git rev-parse --short HEAD)}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      checkout:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run start

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: magician-props-web
    environment:
      PORT: 3000
      REACT_APP_API_URL: ${REACT_APP_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

  load-tester:
    build:
      context: ./docker/load-tester
      dockerfile: Dockerfile
    container_name: magician-props-load-tester
    environment:
      API_URL: http://backend:3001
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  postgres_data:
