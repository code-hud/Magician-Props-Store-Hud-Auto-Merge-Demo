name: HudBot PR Comment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string
      body:
        description: Comment body
        required: true
        type: string

permissions:
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Create installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 1419607
          private-key: ${{ secrets.HUD_BOT_PRIVATE_KEY }}

      - name: Post comment as HudBot
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.pr_number }}'),
              body: '${{ inputs.body }}',
            });
