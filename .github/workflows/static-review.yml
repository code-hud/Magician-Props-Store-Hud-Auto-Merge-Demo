name: Static Review

# A naive static code reviewer. Claude Code runs in the CI runner with the repo
# checked out and read tools available: it reads the PR diff and any related
# code it wants, then guesses the risk of the change WITHOUT any production or
# runtime data, and posts a PR comment. This is the static-analysis foil to
# Hud's runtime risk assessment.

on:
  pull_request:
    branches: [main, 'demo/**']

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  static-review:
    name: Static Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude static risk review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-opus-4-8
          timeout_minutes: "10"
          allowed_tools: "Bash(git diff:*),Bash(git log:*)"
          direct_prompt: |
            You are a code-review bot that estimates the risk of merging a pull
            request. Review this PR: run `git diff` against the base branch to
            see the change, then read the surrounding code — the functions it
            touches, their callers, the endpoints and services that reach them,
            and any tests — to understand what this change actually affects.

            Estimate how risky it is to ship, and give it a score from 0 (trivial,
            isolated) to 100 (critical, high blast radius). Reason about:
            - Blast radius: how many callers, endpoints, and flows depend on the
              changed code, and how central they are.
            - Criticality: does it reach customer-facing or revenue-critical flows
              (checkout, payments, orders, cart, auth)? Does its result get charged
              to customers or persisted?
            - Nature of the change: is it behavior-changing on those paths, or a
              contained/cosmetic edit? Is it covered by tests?

            Weigh reachability into critical flows heavily — code that feeds a
            payment or persistence path carries more risk than isolated code.

            Give a confident, concise verdict. Post a single PR comment in
            GitHub-flavored markdown, in exactly this shape (no preamble):

            ## 🔍 Code Review — Risk: <N>/100 (<Low|Medium|High>)

            **Change:** <one line: the symbol/behavior changed>

            **Why:** 2-4 short bullets on the blast radius and which flows it may touch.

            **Affected flows:** <comma-separated>
